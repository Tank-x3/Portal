# 静的サイトを GitHub Pages にデプロイするワークフロー
name: Deploy to GitHub Pages

on:
  # masterブランチへのpush時に実行
  push:
    branches: ["master"]
  # 手動実行も可能
  workflow_dispatch:

# GitHub Pages デプロイに必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイを防止（最新のもののみ実行）
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: GitHub Pages の設定
        uses: actions/configure-pages@v5

      - name: デプロイ対象をアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
